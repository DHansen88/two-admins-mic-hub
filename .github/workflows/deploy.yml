name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Copy server files to dist
        run: |
          cp public/.htaccess dist/.htaccess
          cp public/robots.txt dist/robots.txt

      - name: Deploy to deploy branch
        run: |
          cd dist
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b deploy
          git add .
          git commit -m "deploy: $GITHUB_SHA"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin deploy

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_hostinger
          chmod 600 ~/.ssh/id_hostinger
          ssh-keyscan -p 65002 82.29.86.190 >> ~/.ssh/known_hosts

      - name: Upload dist to Hostinger
        run: |
          tar -C dist -czf /tmp/site-dist.tgz .
          scp -i ~/.ssh/id_hostinger -P 65002 /tmp/site-dist.tgz \
            u808275895@82.29.86.190:/home/u808275895/domains/twoadminsandamic.com/public_html/site-dist.tgz
          ssh -i ~/.ssh/id_hostinger -p 65002 u808275895@82.29.86.190 \
            "cd /home/u808275895/domains/twoadminsandamic.com/public_html && tar -xzf site-dist.tgz && rm -f site-dist.tgz"
