name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy PHP API & server files to dist
        run: |
          cp -r public/api dist/api
          cp public/.htaccess dist/.htaccess
          cp public/robots.txt dist/robots.txt

      - name: Deploy to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: dist
          clean: true
          single-commit: true

      - name: Sync Hostinger via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 82.29.86.190
          username: u808275895
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          script: |
            cd /home/u808275895/domains/twoadminsandamic.com/public_html
            git fetch origin deploy
            git reset --hard origin/deploy
