name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Copy PHP API & server files to dist
        run: |
          cp -r public/api dist/api
          cp public/.htaccess dist/.htaccess
          cp public/robots.txt dist/robots.txt

      - name: Deploy to deploy branch
        run: |
          cd dist
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b deploy
          git add .
          git commit -m "deploy: $GITHUB_SHA"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin deploy

      - name: Upload dist to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.29.86.190
          username: u808275895
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          source: "dist/*"
          target: "/home/u808275895/domains/twoadminsandamic.com/public_html"
          strip_components: 1
