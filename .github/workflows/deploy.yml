name: CI & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy server files to dist
        run: |
          cp public/.htaccess dist/.htaccess
          cp public/robots.txt dist/robots.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to deploy branch
        run: |
          cd dist
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b deploy
          git add .
          git commit -m "deploy: $GITHUB_SHA"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin deploy

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_hostinger
          chmod 600 ~/.ssh/id_hostinger
          touch ~/.ssh/known_hosts
          ssh-keyscan -p 65002 82.29.86.190 >> ~/.ssh/known_hosts || true
          cat <<'EOF' > ~/.ssh/config
          Host hostinger-deploy
            HostName 82.29.86.190
            Port 65002
            User u808275895
            IdentityFile ~/.ssh/id_hostinger
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload dist to Hostinger
        run: |
          tar -C dist -czf /tmp/site-dist.tgz .
          remote_dir=/home/u808275895/domains/twoadminsandamic.com/public_html

          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3"

            ssh \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              hostinger-deploy \
              "mkdir -p ${remote_dir}" \
            && scp \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              /tmp/site-dist.tgz \
              hostinger-deploy:${remote_dir}/site-dist.tgz \
            && ssh \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              hostinger-deploy \
              "cd ${remote_dir} && tar -xzf site-dist.tgz && rm -f site-dist.tgz" \
            && exit 0

            echo "Deploy attempt ${attempt} failed"
            sleep 10
          done

          echo "Hostinger deploy failed after 3 attempts"
          exit 1
